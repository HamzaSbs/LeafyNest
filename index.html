<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leafy Nest - Nurture Nature</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=K2D:wght@800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <img src="leafyNestLogo.png" alt="Leafy Nest Logo" class="logo-img">
        </div>
        <div class="nav-auth">
            <a href="SignUp.html" class="btn-signup">Sign up</a>
            <a href="Login.html" class="btn-login">Log in</a>
        </div>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <h1 class="hero-title">
                <span class="text-green">NURTURE NATURE</span>
                <span class="text-gradient">GROW HAPPINESS</span>
            </h1>
            <a href="#" class="btn-explore">Explore Plants</a>
        </div>
        <div class="hero-bg-banner" style="background-image: url('BelowHeroNurseryPic.png');"></div>
    </section>

    <section class="categories-section">
        <h2 class="categories-title">Shop by Category</h2>

        <div class="categories-grid">
            <a href="#" class="category-card">
                <img src="indoor_plants.jpg" alt="Indoor Plants" class="category-image">
                <span class="category-label">Indoor Plants</span>
            </a>

            <a href="#" class="category-card">
                <img src="outdoor_plant.jpg" alt="Outdoor Plants" class="category-image">
                <span class="category-label">Outdoor Plants</span>
            </a>

            <a href="#" class="category-card">
                <img src="succulents.jpeg" alt="Succulents" class="category-image">
                <span class="category-label">Succulents</span>
            </a>

            <a href="#" class="category-card">
                <img src="flowering_plants.jpg" alt="Flowering Plants" class="category-image">
                <span class="category-label">Flowering Plants</span>
            </a>

            <a href="#" class="category-card">
                <img src="tree.png" alt="Trees" class="category-image">
                <span class="category-label">Trees</span>
            </a>

            <a href="#" class="category-card">
                <img src="herbs.jpg" alt="Herbs" class="category-image">
                <span class="category-label">Herbs</span>
            </a>
        </div>
    </section>

</body>
</html>
