<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leafy Nest - Sign Up</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=K2D:wght@800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <img src="leafyNestLogo.png" alt="Leafy Nest Logo" class="logo-img">
        </div>
        <div class="nav-auth">
            <a href="signup.html" class="btn-signup">Sign up</a>
            <a href="login.html" class="btn-login">Log in</a>
        </div>
    </header>

    <section class="auth-section">
        <div class="auth-card">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Join Leafy Nest and start growing happiness</p>

            <form class="auth-form" action="#" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Re-enter your password" required>
                </div>

                <div class="form-extra">
                    <label class="remember-me">
                        <input type="checkbox" id="terms" name="terms" required>
                        I agree to the Terms &amp; Privacy Policy
                    </label>
                </div>

                <button type="submit" class="btn-submit">Sign Up</button>
            </form>

            <p class="auth-footer-text">Already have an account? <a href="login.html">Log in</a></p>
        </div>
    </section>

</body>
</html>
